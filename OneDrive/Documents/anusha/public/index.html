<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login / Register</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 350px; }
        h2 { text-align: center; color: #333; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { background: #28a745; color: white; border: none; font-size: 16px; cursor: pointer; }
        button:hover { background: #218838; }
        .toggle-link { text-align: center; color: #007bff; cursor: pointer; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container" id="authBox">
        <h2 id="formTitle">Login</h2>
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password" required>
        
        <div id="registerFields" style="display: none;">
            <input type="text" id="name" placeholder="Full Name">
            <select id="role">
                <option value="student">Student</option>
                <option value="admin">Admin / Faculty</option>
            </select>
        </div>

        <button id="authBtn" onclick="handleSubmit()">Login</button>
        <p class="toggle-link" onclick="toggleForm()" id="toggleText">Don't have an account? Register</p>
    </div>

    <script>
        // --- AUTO-REDIRECT CHECK ---
        // Runs immediately when the page loads to check for existing active sessions
        window.onload = function() {
            const userId = localStorage.getItem('userId');
            const userRole = localStorage.getItem('userRole');

            if (userId && userRole) {
                window.location.href = userRole === 'student' ? '/dashboard.html' : '/admin.html';
            }
        };

        let isLogin = true;
        function toggleForm() {
            isLogin = !isLogin;
            document.getElementById('formTitle').innerText = isLogin ? 'Login' : 'Register';
            document.getElementById('registerFields').style.display = isLogin ? 'none' : 'block';
            document.getElementById('authBtn').innerText = isLogin ? 'Login' : 'Register';
            document.getElementById('toggleText').innerText = isLogin ? "Don't have an account? Register" : "Already have an account? Login";
        }

        async function handleSubmit() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const url = isLogin ? '/api/login' : '/api/register';
            
            const payload = { email, password };
            if (!isLogin) {
                payload.name = document.getElementById('name').value;
                payload.role = document.getElementById('role').value;
            }

            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await res.json();

            if (res.ok) {
                if (isLogin) {
                    // Storing session values inside the browser storage
                    localStorage.setItem('userId', data.userId);
                    localStorage.setItem('userName', data.name);
                    localStorage.setItem('userRole', data.role); // Saved here to enable auto-redirect
                    
                    window.location.href = data.role === 'student' ? '/dashboard.html' : '/admin.html';
                } else {
                    alert("Registration successful! Please login.");
                    toggleForm();
                }
            } else {
                alert(data.error || "An error occurred");
            }
        }
    </script>
</body>
</html>
